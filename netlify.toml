[build]
  command = "npm run build"
  publish = "dist" # The folder Vite outputs static files to

[functions]
  node_bundler = "esbuild"

# Proxy all /api routes to the Netlify Serverless Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Catch-all for the Single Page Application (React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
